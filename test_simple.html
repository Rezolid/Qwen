<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Test</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; }
    #start-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 500;
    }
    .hidden { display: none !important; }
    #start-button {
      padding: 15px 40px;
      font-size: 20px;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
    }
    #hud { display: none; }
    #hud.visible { display: block; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div id="start-screen">
    <h1 style="color:#0ff;font-size:48px;">SELENE OUTPOST</h1>
    <p>Moon Base Explorer</p>
    <button id="start-button">BEGIN MISSION</button>
  </div>
  
  <div id="hud">
    <h2 style="position:absolute;top:20px;left:20px;color:#0ff;">GAME RUNNING!</h2>
    <p style="position:absolute;top:60px;left:20px;">Press WASD to move, Mouse to look</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    console.log('Script loaded');
    
    const startButton = document.getElementById('start-button');
    const startScreen = document.getElementById('start-screen');
    const canvas = document.getElementById('gameCanvas');
    const hud = document.getElementById('hud');
    
    let scene, camera, renderer, isRunning = false;
    
    startButton.addEventListener('click', () => {
      console.log('BUTTON CLICKED!');
      
      // Hide start screen
      startScreen.classList.add('hidden');
      console.log('Start screen hidden:', startScreen.classList.contains('hidden'));
      
      // Show HUD
      hud.classList.add('visible');
      
      // Init Three.js
      if (!scene) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        renderer = new THREE.WebGLRenderer({ canvas });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // Add a cube
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        
        // Add lights
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
      }
      
      isRunning = true;
      animate();
    });
    
    function animate() {
      if (!isRunning) return;
      requestAnimationFrame(animate);
      
      // Rotate cube
      if (scene.children.length > 0) {
        scene.children[0].rotation.x += 0.01;
        scene.children[0].rotation.y += 0.01;
      }
      
      renderer.render(scene, camera);
    }
    
    console.log('Test page ready');
  </script>
</body>
</html>
