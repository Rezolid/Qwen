<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Test</title>
  <style>
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 500;
      color: #fff;
    }
    .hidden { display: none !important; }
    #start-button {
      padding: 15px 40px;
      font-size: 20px;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      cursor: pointer;
    }
    #status { margin-top: 20px; color: #0f0; }
  </style>
</head>
<body>
  <div id="start-screen">
    <h1>Test</h1>
    <button id="start-button">BEGIN</button>
    <div id="status">Waiting...</div>
  </div>
  
  <script>
    const startButton = document.getElementById('start-button');
    const startScreen = document.getElementById('start-screen');
    const status = document.getElementById('status');
    
    console.log('Button element:', startButton);
    console.log('Start screen:', startScreen);
    
    startButton.addEventListener('click', () => {
      console.log('CLICKED!');
      status.textContent = 'Button clicked! Hiding screen...';
      startScreen.classList.add('hidden');
      status.textContent = 'Screen hidden! Check if start-screen has hidden class.';
    });
  </script>
</body>
</html>
